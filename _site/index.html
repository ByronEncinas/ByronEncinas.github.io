<!DOCTYPE html>
<html>
<head>
    <title>Byron Encinas Blog</title>
    <style>
        #toc {
            float: right;
            width: 200px;
            margin-left: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
        #toc ul {
            list-style: none;
            padding: 0;
        }
        #toc li {
            margin: 5px 0;
        }
        #toc a {
            text-decoration: none;
            color: #333;
        }
        #toc a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 800px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Byron Encinas Blog</h1>
    </header>
    <main>
        
        <h1 id="welcome-to-my-blog">Welcome to My Blog</h1>

<p>This is the home page of my personal blog built with Jekyll and GitHub Pages.</p>

<h2 id="latest-posts">Latest Posts</h2>

<ul>
  <li><a href="/2026/04/26/welcome-to-my-blog.html">Welcome to My Blog</a> - April 26, 2026</li>
</ul>

    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const headings = document.querySelectorAll('h2, h3, h4');
            if (headings.length > 0) {
                const toc = document.getElementById('toc');
                const ul = document.createElement('ul');
                headings.forEach(h => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    const id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                    h.id = id;
                    a.href = '#' + id;
                    a.textContent = h.textContent;
                    li.style.marginLeft = (h.tagName === 'H3' ? '20px' : h.tagName === 'H4' ? '40px' : '0');
                    li.appendChild(a);
                    ul.appendChild(li);
                });
                toc.appendChild(ul);
            } else {
                document.getElementById('toc').style.display = 'none';
            }
        });
    </script>
</body>
</html>
