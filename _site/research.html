<!DOCTYPE html>
<html>
<head>
    <title>Byron J. Encinas-Velazquez</title>
    <style>
        /* CSS Variables for theming */
        :root {
            /* Light theme colors */
            --bg-color: #ffffff;
            --text-color: #333333;
            --toc-bg: #f9f9f9;
            --toc-border: #cccccc;
            --link-color: #333333;
            --link-hover: #000000;
            --button-bg: #f9f9f9;
            --button-border: #cccccc;
        }
        [data-theme="dark"] {
            /* Dark theme colors - softer for eye comfort */
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --toc-bg: #2a2a2a;
            --toc-border: #444444;
            --link-color: #87ceeb;
            --link-hover: #add8e6;
            --button-bg: #2a2a2a;
            --button-border: #444444;
        }
        /* Body styling with theme variables */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        /* Table of Contents styling */
        #toc {
            float: right;
            width: 200px;
            margin-left: 20px;
            padding: 10px;
            border: 1px solid var(--toc-border);
            background: var(--toc-bg);
        }
        #toc ul {
            list-style: none;
            padding: 0;
        }
        #toc li {
            margin: 5px 0;
        }
        #toc a {
            text-decoration: none;
            color: var(--link-color);
        }
        #toc a:hover {
            text-decoration: underline;
            color: var(--link-hover);
        }
        /* Centered container for all page content */
        .container {
            margin: 0 auto;
            padding: 0 20px;
        }
        /* Main content area - centered within container */
        main {
            max-width: 800px;
            margin: 0 auto;
        }
        /* One-column layout for posts - full width with container padding */
        main.has-toc {
            max-width: none;
            margin: 0;
        }
        /* One-column layout for posts with TOC below content */
        main.has-toc #toc {
            float: none;
            width: auto;
            margin-top: 20px;
        }
        /* Dark mode toggle button */
        #theme-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            color: var(--text-color);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        #theme-toggle:hover {
            background: var(--toc-bg);
        }
        /* Navigation menu styling */
        nav ul {
            list-style: none;
            padding: 0;
            margin: 10px 0;
            display: flex;
            gap: 20px;
        }
        nav li {
            display: inline;
        }
        nav a {
            text-decoration: none;
            color: var(--link-color);
            padding: 5px 10px;
            border-radius: 5px;
        }
        nav a:hover {
            background: var(--toc-bg);
            color: var(--link-hover);
        }
    </style>
</head>
<body>
    <!-- Centered container for page layout -->
    <div class="container">
        <header>
            <h1>Byron J. Encinas-Velazquez</h1>
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/posts">Posts</a></li>
                    <li><a href="/research">Research</a></li>
                    <li><a href="/open-source">Open Source</a></li>
                    <li><a href="/about">About</a></li>
                </ul>
            </nav>
            <button id="theme-toggle">Toggle Dark Mode</button>
        </header>
        <!-- Main content area, with TOC class for posts -->
        <main>
            <h2>Research</h2>

<p>This page is under construction. Here I will share my research work and publications.</p>

            
        </main>
    </div>
    <script>
        // Generate Table of Contents for blog posts
        document.addEventListener('DOMContentLoaded', function() {
            const headings = document.querySelectorAll('h2, h3, h4');
            if (headings.length > 0) {
                const toc = document.getElementById('toc');
                const ul = document.createElement('ul');
                headings.forEach(h => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    // Create anchor ID from heading text
                    const id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                    h.id = id;
                    a.href = '#' + id;
                    a.textContent = h.textContent;
                    // Indent subheadings
                    li.style.marginLeft = (h.tagName === 'H3' ? '20px' : h.tagName === 'H4' ? '40px' : '0');
                    li.appendChild(a);
                    ul.appendChild(li);
                });
                toc.appendChild(ul);
            } else {
                // Hide TOC if no headings
                document.getElementById('toc').style.display = 'none';
            }
        });

        // Dark mode toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Load saved theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.setAttribute('data-theme', savedTheme);
        }

        // Toggle theme on button click
        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
